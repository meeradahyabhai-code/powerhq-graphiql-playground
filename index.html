<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PowerHQ API — Playground</title>
<link rel="stylesheet" href="https://unpkg.com/graphiql@3/graphiql.min.css" />
<style>
  html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:9px 14px;
    background:linear-gradient(90deg,#117b69,#12a58c);color:#fff;flex:0 0 auto}
  .bar .title{font-weight:750;font-size:15px;white-space:nowrap}
  .bar .pill{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);
    border-radius:999px;padding:3px 11px;font-size:12.5px;font-weight:600;white-space:nowrap}
  .bar .note{font-size:12.5px;color:rgba(255,255,255,.92)}
  .bar .note a{color:#fff;text-decoration:underline}
  #graphiql{flex:1 1 auto;min-height:0}
  #graphiql .loading{padding:40px;color:#5c6f6a}

  /* hide the left sidebar (Docs Explorer + Show History icons) for more room */
  .graphiql-sidebar{display:none !important}

  /* stack the query editor ABOVE the response (Mintlify's column is narrow) */
  .graphiql-session{flex-direction:column !important}
  .graphiql-editors,.graphiql-response{width:100% !important}
  .graphiql-editors{flex:1 1 55% !important;min-height:200px !important}
  .graphiql-response{flex:1 1 45% !important;min-height:170px !important}
  .graphiql-horizontal-drag-bar{display:none !important}
</style>
</head>
<body>
<div class="bar">
  <span class="title">⚡ PowerHQ Playground</span>
  <span class="pill">10 free calls</span>
  <span class="note">Try live queries. Need more? <a href="mailto:support@powerhq.co">Get an API key</a>.</span>
</div>
<div id="graphiql"><div class="loading">Loading playground…</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/graphiql@3/graphiql.min.js"></script>
<script>
  // Limited public tester config — fill these once the CORS sandbox + tester key exist.
  // Rate limiting (e.g. 10 calls / IP) is enforced server-side by PowerHQ, not here.
  // Points at YOUR local proxy (via cloudflared tunnel). The proxy holds the key + adds CORS.
  // NOTE: this trycloudflare URL changes each time the tunnel restarts — update on restart.
  const ENDPOINT   = "https://42dfc9a33d997a.lhr.life";
  const TESTER_KEY = ""; // no key here — the proxy injects it server-side

  const DEFAULT_QUERY = [
    '# PowerHQ Plan Data API — edit a query, then press the ▶ Run button.',
    '',
    '{',
    '  residentialPlans(zipCode: "77002", monthlyUsage: 1000) {',
    '    title',
    '    price',
    '    term',
    '    rateType',
    '    supplier { name }',
    '    rates { usageKwh allInRateUsdPerKwh avgMonthlyBillUsd }',
    '  }',
    '}',
    '',
    '# More examples — paste one in and Run:',
    '# { utilities(zipCode: "75231") { id name } }',
    '# { nextStartDate(zipCode: "75070", isMoveIn: false) { nextStartDate } }',
    '# { businessPlans(zipCode: "75070", annualUsageInkWh: 23000, isMoveIn: true) { id term price monthlyFee supplier { name } } }',
    '# { energyInfoByState(stateCode: "TX", isBusiness: false) { averagePrice stateName electricityGenerationPercentage { renewableGeneration nonRenewableGeneration } } }'
  ].join('\n');

  const fetcher = GraphiQL.createFetcher({
    url: ENDPOINT,
    headers: TESTER_KEY ? { 'x-api-key': TESTER_KEY } : {}
  });

  ReactDOM.createRoot(document.getElementById('graphiql')).render(
    React.createElement(GraphiQL, {
      fetcher: fetcher,
      defaultQuery: DEFAULT_QUERY
    })
  );
</script>
</body>
</html>
